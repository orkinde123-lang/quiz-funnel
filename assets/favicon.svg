<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1c30"/>
      <stop offset="100%" style="stop-color:#162547"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8fb8d8"/>
      <stop offset="100%" style="stop-color:#c8a96e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Accent ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.5"/>
  <!-- Letter א in Hebrew - stylized as "O" brand mark -->
  <text
    x="256" y="320"
    font-family="Georgia, serif"
    font-size="260"
    font-weight="700"
    fill="#f0f2f5"
    text-anchor="middle"
    dominant-baseline="auto"
  >א</text>
</svg>
