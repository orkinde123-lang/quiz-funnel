  <style>
    *, *::before, *::after { box-sizing: border-box; }

    @keyframes pillFloat {
      0%, 100% { transform:translateY(0px); }

      position: absolute;
      animation: pillEnter 2.4s cubic-bezier(0.23,0.86,0.39,0.96) var(--pd, 0s) both;

    .pill-inner {
      animation: pillFloat 12s ease-in-out calc(var(--pd, 0s) + 2.4s) infinite;

      overflow: hidden;

      -webkit-box-shadow: 0 0 0 1000px rgba(22,37,71,.96) inset !important;
      -webkit-text-fill-color: #e0e1dd !important;
    }
  </style>
</head>

    /* ══════════════════════════════════════

    function QuizScreen({ onComplete }) {
      const [qIdx,      setQIdx]      = useState(0);
      const [scores,    setScores]    = useState({ M:0, B:0, T:0, P:0 });
      const [chosenIdx, setChosenIdx] = useState(null);

      const total = QUESTIONS.length;
      const pct   = Math.round(((qIdx + 1) / total) * 100);

      const pick = useCallback((type, idx) => {
        if (chosenIdx !== null) return;
        setChosenIdx(idx);
        const next = type !== 'X'
          ? { ...scores, [type]: scores[type] + 1 }
          : { ...scores };
        setScores(next);
        setTimeout(() => {
          const nextIdx = qIdx + 1;
          if (nextIdx < total) { setQIdx(nextIdx); setChosenIdx(null); }
          else                 { onComplete(next); }
        }, 480);
      }, [chosenIdx, scores, qIdx, total, onComplete]);

      return (
        <div className="animate-fade-up w-full" style={{ maxWidth:640 }}>

          {/* Progress */}
          <div style={{ marginBottom:28 }}>
            <div style={{
              display:'flex', justifyContent:'space-between',
              fontSize:'.82rem', fontWeight:600,
              color:'rgba(130,147,177,0.7)', marginBottom:10,
            }}>
              <span>שאלה {qIdx + 1} מתוך {total}</span>
              <span style={{ color:'#8293b1' }}>{pct}%</span>
            </div>
            <div style={{
              height:4, background:'rgba(255,255,255,0.07)',
              borderRadius:'99px', overflow:'hidden',
            }}>
              <div style={{
                width:`${pct}%`, height:'100%',
                background:'linear-gradient(90deg, #465975, #8293b1)',
                borderRadius:'99px',
                transition:'width 0.5s cubic-bezier(.4,0,.2,1)',
              }} />
            </div>
          </div>

          {/* Question card */}
          <div style={{
            background:'rgba(70,89,117,0.18)',
            border:'1.5px solid rgba(130,147,177,0.14)',
            borderRadius:22,
            padding:'36px 32px',
            backdropFilter:'blur(20px)',
            boxShadow:'0 20px 60px rgba(22,37,71,0.40)',
          }}>
            <p style={{
              fontSize:'1.22rem',
              fontWeight:700,
              lineHeight:1.65,
              color:'#e0e1dd',
              marginBottom:28,
              marginTop:0,
            }}>
              {QUESTIONS[qIdx].q}
            </p>
            <div style={{ display:'flex', flexDirection:'column', gap:11 }}>
              {QUESTIONS[qIdx].a.map((ans, i) => (
                <button key={`${qIdx}-${i}`}
                  disabled={chosenIdx !== null}
                  onClick={() => pick(ans.type, i)}
                  className={['ans-btn', chosenIdx===i?'chosen':'', chosenIdx!==null&&chosenIdx!==i?'dimmed':''].join(' ')}>
                  {ans.t}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function FormScreen({ profile, onSuccess }) {
      const [form,        setForm]        = useState({ full_name:'', email:'' });
      const [errors,      setErrors]      = useState({});
      const [touched,     setTouched]     = useState({});
      const [emailHint,   setEmailHint]   = useState('');
      const [emailValid,  setEmailValid]  = useState(false);
      const [loading,     setLoading]     = useState(false);
      const [serverErr,   setServerErr]   = useState('');

      function validateEmailField(val) {
        if (!val.trim()) return 'שדה חובה';
        if (!isValidEmail(val)) return 'כתובת אימייל לא תקינה — בדקי שכתבת נכון';
        return '';
      }

      const set = k => e => {
        const val = e.target.value;
        setForm(p => ({ ...p, [k]: val }));
        if (touched[k]) {
          if (k === 'email') {
            const err = validateEmailField(val);
            setErrors(p => ({ ...p, email: err }));
            setEmailValid(!err && !suggestEmail(val));
            setEmailHint(!err ? (suggestEmail(val) ? `האם התכוונת ל-${suggestEmail(val)}?` : '') : '');
          }
          if (k === 'full_name') {
            setErrors(p => ({ ...p, full_name: val.trim() ? '' : 'שדה חובה' }));
          }
        }
      };

      const handleEmailBlur = () => {
        setTouched(p => ({ ...p, email: true }));
        const err = validateEmailField(form.email);
        setErrors(p => ({ ...p, email: err }));
        const suggestion = suggestEmail(form.email);
        setEmailValid(!err && !suggestion);
        setEmailHint(!err && suggestion ? `האם התכוונת ל-${suggestion}?` : '');
      };

      const handleNameBlur = () => {
        setTouched(p => ({ ...p, full_name: true }));
        if (!form.full_name.trim()) setErrors(p => ({ ...p, full_name: 'שדה חובה' }));
      };

      const applyEmailSuggestion = () => {
        const suggestion = suggestEmail(form.email);
        if (!suggestion) return;
        setForm(p => ({ ...p, email: suggestion }));
        setEmailHint('');
        setEmailValid(true);
        setErrors(p => ({ ...p, email: '' }));
      };

      function validate() {
        const e = {};
        if (!form.full_name.trim()) e.full_name = 'שדה חובה';
        const emailErr = validateEmailField(form.email);
        if (emailErr) e.email = emailErr;
        else if (suggestEmail(form.email)) e.email = `נראה שיש שגיאת הקלדה — האם התכוונת ל-${suggestEmail(form.email)}?`;
        return e;
      }

      async function handleSubmit(ev) {
        ev.preventDefault();
        setServerErr('');
        setTouched({ full_name: true, email: true });
        const errs = validate();
        if (Object.keys(errs).length) { setErrors(errs); return; }
        setErrors({});
        setLoading(true);
        try {
          await Promise.allSettled([
            fetch(WEBHOOK, {
              method:'POST',
              headers:{ 'Content-Type':'application/json' },
              body: JSON.stringify({
                full_name:             form.full_name.trim(),
                email:                 form.email.trim(),
                diagnosis_title:       profile.label,
                diagnosis_description: profile.desc,
              }),
            }),
            addToRavMesser(form.email.trim(), form.full_name.trim()),
          ]);
          onSuccess(form.full_name.trim());
        } catch (err) {
          console.error(err);
          setServerErr('שגיאה בשליחה. אנא נסי שנית.');
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="animate-fade-up w-full" style={{ maxWidth:500 }}>
          <Logo />
          <div style={{
            background:'rgba(70,89,117,0.18)',
            border:'1.5px solid rgba(130,147,177,0.14)',
            borderRadius:24,
            padding:'44px 36px',
            backdropFilter:'blur(24px)',
            boxShadow:'0 24px 64px rgba(22,37,71,0.45)',
          }}>
            <div style={{ textAlign:'center', marginBottom:32 }}>
              <div style={{
                width:56, height:56, borderRadius:'50%',
                background:'rgba(130,147,177,0.14)',
                border:'1.5px solid rgba(130,147,177,0.22)',
                display:'flex', alignItems:'center', justifyContent:'center',
                margin:'0 auto 16px',
                fontSize:'1.5rem',
              }}>
                🎯
              </div>
              <h2 style={{
                color:'#e0e1dd', fontSize:'1.65rem',
                fontWeight:800, margin:'0 0 10px',
                letterSpacing:'-0.01em',
              }}>
                כמעט שם!
              </h2>
              <p style={{ color:'#8293b1', fontSize:'.97rem', lineHeight:1.7, margin:0, fontWeight:400 }}>
                הכניסי את הפרטים שלך<br />האבחון האישי שלך יוצג מיד
              </p>
            </div>

            <form onSubmit={handleSubmit} noValidate>
              <Field label="שם מלא" id="full_name" placeholder="ישראלה ישראלי"
                     value={form.full_name} onChange={set('full_name')} onBlur={handleNameBlur}
                     error={errors.full_name} />
              <Field label="כתובת אימייל" id="email" type="email" placeholder="you@example.com"
                     value={form.email} onChange={set('email')} onBlur={handleEmailBlur}
                     error={errors.email} hint={emailHint} valid={emailValid} />
              {emailHint && !errors.email && (
                <div style={{ marginTop:-12, marginBottom:16 }}>
                  <button type="button" onClick={applyEmailSuggestion} style={{
                    background:'rgba(251,191,36,0.12)',
                    border:'1px solid rgba(251,191,36,0.35)',
                    borderRadius:8, padding:'7px 16px',
                    color:'rgba(251,191,36,0.95)', fontSize:'.80rem', fontWeight:700,
                    cursor:'pointer', fontFamily:"'Rubik', sans-serif",
                    transition:'all .18s',
                  }}
                  onMouseEnter={e => e.target.style.background='rgba(251,191,36,0.22)'}
                  onMouseLeave={e => e.target.style.background='rgba(251,191,36,0.12)'}>
                    כן, תקני אוטומטית ←
                  </button>
                </div>
              )}

              {serverErr && (
                <div style={{
                  marginBottom:16, padding:'12px 18px', borderRadius:12,
                  fontSize:'.88rem', fontWeight:600,
                  background:'rgba(248,113,113,0.12)',
                  border:'1px solid rgba(248,113,113,0.28)',
                  color:'rgba(248,113,113,0.9)',
                }}>
                  {serverErr}
                </div>
              )}

              <button type="submit" disabled={loading} style={{
                width:'100%', marginTop:4,
                padding:'17px 24px',
                borderRadius:'50px',
                fontWeight:800, fontSize:'1.05rem',
                color:'#e0e1dd', fontFamily:"'Rubik', sans-serif",
                background: loading ? 'rgba(70,89,117,0.35)' : 'linear-gradient(145deg, #465975, #2a4060)',
                border:'1.5px solid rgba(130,147,177,0.25)',
                cursor: loading ? 'not-allowed' : 'pointer',
                display:'flex', alignItems:'center', justifyContent:'center', gap:10,
                transition:'all .22s',
                boxShadow: loading ? 'none' : '0 6px 24px rgba(22,37,71,0.40)',
                opacity: loading ? 0.7 : 1,
              }}>
                {loading ? (
                  <>
                    <svg style={{ width:20, height:20, animation:'spinR 0.8s linear infinite' }}
                      viewBox="0 0 24 24" fill="none">
                      <circle style={{ opacity:.25 }} cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                      <path style={{ opacity:.8 }} fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                    שולח...
                  </>
                ) : 'הצגי לי את האבחון ←'}
              </button>

              <p style={{
                textAlign:'center', fontSize:'.78rem',
                color:'rgba(130,147,177,0.40)', marginTop:16, fontWeight:400,
              }}>
                לא נשלח ספאם · הפרטים שלך מאובטחים
              </p>
            </form>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       RESULT SCREEN
    ══════════════════════════════════════ */
    function CTABox() {
      return (
        <div className="cta-box">
          <div style={{ position:'relative', zIndex:1 }}>
            <div style={{
              display:'inline-block',
              background:'rgba(224,225,221,0.12)',
              border:'1px solid rgba(224,225,221,0.20)',
              color:'rgba(224,225,221,0.70)',
              fontSize:'.76rem', fontWeight:700, letterSpacing:'.07em',
              padding:'4px 16px', borderRadius:'99px', marginBottom:20,
            }}>
              הצעד הבא שלך
            </div>
            <p style={{ fontSize:'1.05rem', lineHeight:1.8, marginBottom:26, fontWeight:500, color:'rgba(224,225,221,0.90)' }}>
              רוצה להבין איך השינוי יכול להתאים בעסק שלך?<br />
              הטמעה של הידע הזה יכולה לקחת אותך לשם<br />
              בהרבה פחות עבודה, מאמץ ותסכול.
            </p>
            <p style={{ fontSize:'.97rem', fontWeight:700, color:'#e0e1dd', marginBottom:28 }}>
              כאן תוכלי לקבל פגישת אבחון של 90 דק׳ ללא עלות.
            </p>
            <a href="#" className="cta-btn">
              כן! אני רוצה להגיע לרמה הבאה שלי ←
            </a>
          </div>
        </div>
      );
    }

    function ScoreBars({ scores, winnerKey }) {
      return (
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          {TYPE_ORDER.map(k => {
            const pct      = Math.round((scores[k] / TOTAL_SCORED) * 100);
            const prof     = PROFILES[k];
            const isWinner = k === winnerKey;
            return (
              <div key={k}>
                <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:7 }}>
                  <span style={{
                    fontSize: isWinner ? '1rem' : '.88rem',
                    fontWeight: isWinner ? 800 : 500,
                    color: isWinner ? '#162547' : '#6b7280',
                    minWidth:148,
                  }}>
                    {prof.label} {isWinner && '⭐'}
                  </span>
                  <span style={{
                    fontSize:'.85rem',
                    color: isWinner ? '#465975' : '#9ca3af',
                    fontWeight:700,
                  }}>
                    {pct}%
                  </span>
                </div>
                <div className="score-bar-track">
                  <div className="score-bar-fill" style={{
                    '--bar-w': `${pct}%`,
                    width:`${pct}%`,
                    background: isWinner
                      ? 'linear-gradient(90deg, #465975, #162547)'
                      : '#c5cdd9',
                    opacity: isWinner ? 1 : 0.55,
                  }} />
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function ResultScreen({ profile, scores, userName }) {
      useEffect(() => {
        document.body.style.background = '#e0e1dd';
        window.scrollTo({ top:0, behavior:'instant' });
        return () => { document.body.style.background = ''; };
      }, []);

      const descParagraphs = profile.desc.split('\n\n');

      return (
        <div className="result-page animate-fade-in">

          {/* ── Hero ── */}
          <div className="result-hero">
            <Logo small />
            <div style={{ marginTop:22, position:'relative', zIndex:1 }}>
              <div className="hero-badge">הפרופיל השיווקי שלך</div>
              <h1 style={{
                color:'#e0e1dd',
                fontSize:'clamp(2rem,6vw,3rem)',
                fontWeight:800,
                margin:'0 0 16px',
                lineHeight:1.2,
                letterSpacing:'-0.02em',
              }}>
                {profile.label}
              </h1>
              <div style={{
                width:52, height:3,
                background:'linear-gradient(90deg, rgba(130,147,177,0.5), rgba(224,225,221,0.3))',
                borderRadius:'99px',
                margin:'0 auto 20px',
              }} />
              <p style={{
                color:'rgba(224,225,221,0.72)',
                fontSize:'1rem', lineHeight:1.75,
                maxWidth:520, margin:'0 auto',
                fontWeight:400,
              }}>
                הנה הדרך המומלצת עבורך להכפיל את הרווחים בעסק וגם ליהנות מהעשייה שלך
              </p>
            </div>
          </div>

          <div className="result-container">

            {/* Top CTA */}
            <div style={{ marginTop:'-32px' }}>
              <CTABox />
            </div>

            {/* Score card */}
            <div className="result-card">
              <span className="section-tag"
                style={{ background: profile.colorLight, color: profile.color }}>
                התוצאות שלך
              </span>
              <h2 style={{
                fontSize:'1.28rem', fontWeight:800,
                color:'#162547', marginBottom:24, marginTop:4,
              }}>
                הנה האבחון שלך
              </h2>
              <ScoreBars scores={scores} winnerKey={profile.key} />
            </div>

            {/* Diagnosis */}
            <div className="result-card">
              <span className="section-tag"
                style={{ background: profile.colorLight, color: profile.color }}>
                האבחון המלא
              </span>
              <h2 style={{
                fontSize:'1.22rem', fontWeight:800,
                color:'#162547', marginBottom:6, marginTop:4,
              }}>
                {profile.label} — מה זה אומר עליך?
              </h2>
              <div className="divider-line" style={{ margin:'0 0 20px' }} />
              {descParagraphs.map((p, i) => (
                <p key={i} style={{
                  color:'#2d3d56',
                  lineHeight:1.85,
                  marginBottom: i < descParagraphs.length - 1 ? 18 : 0,
                  fontSize:'.98rem',
                  fontWeight:400,
                }}>
                  {p}
                </p>
              ))}
            </div>

            {/* Strengths & Challenges */}
            <div className="grid-2">
              <div className="result-card" style={{ marginBottom:0 }}>
                <span className="section-tag" style={{ background:'#d1fae5', color:'#065f46' }}>
                  החוזקות שלך
                </span>
                <div style={{ marginTop:8 }}>
                  {profile.strengths.map((s, i) => (
                    <div key={i} className="strength-item">
                      <span style={{ color:'#10b981', fontSize:'1rem', flexShrink:0, marginTop:2, fontWeight:700 }}>✓</span>
                      <span>{s}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div className="result-card" style={{ marginBottom:0 }}>
                <span className="section-tag" style={{ background:'#fee2e2', color:'#991b1b' }}>
                  האתגרים שלך
                </span>
                <div style={{ marginTop:8 }}>
                  {profile.challenges.map((c, i) => (
                    <div key={i} className="challenge-item">
                      <span style={{ fontSize:'1rem', flexShrink:0, marginTop:2 }}>🤚🏼</span>
                      <span>{c}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Scale struggle */}
            <div className="result-card" style={{ marginTop:16 }}>
              <span className="section-tag" style={{ background:'#fef3c7', color:'#92400e' }}>
                נקודת העיוורון שלך
              </span>
              <h2 style={{
                fontSize:'1.22rem', fontWeight:800,
                color:'#162547', margin:'8px 0 12px',
              }}>
                למה את מתקשה לעשות סקייל?
              </h2>
              <div className="divider-line" style={{ margin:'0 0 18px' }} />
              <p style={{
                color:'#2d3d56',
                lineHeight:1.85,
                fontSize:'.98rem',
                fontWeight:400,
                margin:0,
              }}>
                {profile.scaleStruggle}
              </p>
            </div>

            {/* Footer CTA */}
            <div style={{ marginTop:16 }}>
              <CTABox />
            </div>

          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       APP ROOT
    ══════════════════════════════════════ */
    function App() {
      const [step,     setStep]     = useState('intro');
      const [profile,  setProfile]  = useState(null);
      const [scores,   setScores]   = useState({ M:0, B:0, T:0, P:0 });
      const [userName, setUserName] = useState('');

      const handleQuizComplete = useCallback((finalScores) => {
        setScores(finalScores);
        setProfile(calcResult(finalScores));
        setStep('form');
        window.scrollTo({ top:0, behavior:'smooth' });
      }, []);

      const handleFormSuccess = useCallback((name) => {
        setUserName(name);
        setStep('result');
      }, []);

      if (step === 'result') {
        return <ResultScreen profile={profile} scores={scores} userName={userName} />;
      }

      return (
        <div style={{
          position:'relative', minHeight:'100vh',
          display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center',
          padding:'64px 16px',
        }}>
          <Background />
          <div style={{ position:'relative', zIndex:10, width:'100%', display:'flex', flexDirection:'column', alignItems:'center' }}>
            {step === 'intro' && <IntroScreen onStart={() => setStep('quiz')} />}
            {step === 'quiz'  && <QuizScreen  onComplete={handleQuizComplete} />}
            {step === 'form'  && <FormScreen  profile={profile} onSuccess={handleFormSuccess} />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
