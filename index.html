    /* ─── Beams Background ─── */
    function Background() {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        let animFrame;
        let beams = [];

        function createBeam(w, h) {
          return {
            x: Math.random() * w * 1.5 - w * 0.25,
            y: Math.random() * h * 1.5 - h * 0.25,
            width: 28 + Math.random() * 55,
            length: h * 2.5,
            angle: -35 + Math.random() * 10,
            speed: 0.35 + Math.random() * 0.7,
            opacity: 0.05 + Math.random() * 0.09,
            hue: 205 + Math.random() * 25,
            pulse: Math.random() * Math.PI * 2,
            pulseSpeed: 0.018 + Math.random() * 0.025,
          };
        }

        function getSize() {
          return { w: parseInt(canvas.style.width) || window.innerWidth, h: parseInt(canvas.style.height) || window.innerHeight };
        }

        function resetBeam(beam, index) {
          const { w, h } = getSize();
          const col = index % 3;
          const spacing = w / 3;
          beam.y = h + 100;
          beam.x = col * spacing + spacing / 2 + (Math.random() - 0.5) * spacing * 0.5;
          beam.width = 70 + Math.random() * 80;
          beam.speed = 0.35 + Math.random() * 0.55;
          beam.hue = 205 + (index * 25) / 22;
          beam.opacity = 0.05 + Math.random() * 0.07;
        }

        function drawBeam(beam) {
          ctx.save();
          ctx.translate(beam.x, beam.y);
          ctx.rotate(beam.angle * Math.PI / 180);
          const op = beam.opacity * (0.8 + Math.sin(beam.pulse) * 0.2);
          const g = ctx.createLinearGradient(0, 0, 0, beam.length);
          g.addColorStop(0,   `hsla(${beam.hue},55%,68%,0)`);
          g.addColorStop(0.1, `hsla(${beam.hue},55%,68%,${op*0.5})`);
          g.addColorStop(0.4, `hsla(${beam.hue},55%,68%,${op})`);
          g.addColorStop(0.6, `hsla(${beam.hue},55%,68%,${op})`);
          g.addColorStop(0.9, `hsla(${beam.hue},55%,68%,${op*0.5})`);
          g.addColorStop(1,   `hsla(${beam.hue},55%,68%,0)`);
          ctx.fillStyle = g;
          ctx.fillRect(-beam.width / 2, 0, beam.width, beam.length);
          ctx.restore();
        }

        function updateSize() {
          const dpr = window.devicePixelRatio || 1;
          canvas.width  = window.innerWidth  * dpr;
          canvas.height = window.innerHeight * dpr;
          canvas.style.width  = window.innerWidth  + 'px';
          canvas.style.height = window.innerHeight + 'px';
          ctx.scale(dpr, dpr);
          beams = Array.from({ length: 22 }, () => createBeam(window.innerWidth, window.innerHeight));
        }

        function animate() {
          const { w, h } = getSize();
          ctx.clearRect(0, 0, w, h);
          ctx.filter = 'blur(32px)';
          beams.forEach((beam, i) => {
            beam.y -= beam.speed;
            beam.pulse += beam.pulseSpeed;
            if (beam.y + beam.length < -100) resetBeam(beam, i);
            drawBeam(beam);
          });
          animFrame = requestAnimationFrame(animate);
        }

        updateSize();
        window.addEventListener('resize', updateSize);
        animate();

        return () => {
          window.removeEventListener('resize', updateSize);
          cancelAnimationFrame(animFrame);
        };
      }, []);

      return (
        <div style={{ position:'fixed', inset:0, overflow:'hidden', pointerEvents:'none', zIndex:0 }}>
          <canvas ref={canvasRef} style={{ position:'absolute', inset:0 }} />
          <div style={{ position:'absolute', inset:0, background:'radial-gradient(ellipse at 30% 15%, rgba(70,89,117,0.12) 0%, transparent 55%)' }} />
          <div style={{ position:'absolute', inset:0, background:'radial-gradient(ellipse at 75% 85%, rgba(130,147,177,0.08) 0%, transparent 50%)' }} />
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, #162547 0%, transparent 20%, transparent 80%, #162547 100%)' }} />
        </div>
      );
    }

    /* ══════════════════════════════════════
       QUIZ SCREEN
    ══════════════════════════════════════ */
    function QuizScreen({ onComplete }) {
      const [qIdx,      setQIdx]      = useState(0);
      const [scores,    setScores]    = useState({ M:0, B:0, T:0, P:0 });
      const [chosenIdx, setChosenIdx] = useState(null);
      const [history,   setHistory]   = useState([]);

      const total = QUESTIONS.length;
      const pct   = Math.round(((qIdx + 1) / total) * 100);

      const pick = useCallback((type, idx) => {
        if (chosenIdx !== null) return;
        setChosenIdx(idx);
        const savedScores = scores;
        setHistory(h => [...h, savedScores]);
        const next = type !== 'X'
          ? { ...scores, [type]: scores[type] + 1 }
          : { ...scores };
        setScores(next);
        setTimeout(() => {
          const nextIdx = qIdx + 1;
          if (nextIdx < total) { setQIdx(nextIdx); setChosenIdx(null); }
          else                 { onComplete(next); }
        }, 480);
      }, [chosenIdx, scores, qIdx, total, onComplete]);

      const goBack = useCallback(() => {
        if (history.length === 0) return;
        const prev = history[history.length - 1];
        setHistory(h => h.slice(0, -1));
        setScores(prev);
        setQIdx(q => q - 1);
        setChosenIdx(null);
      }, [history]);

      return (
        <div className="animate-fade-up w-full" style={{ maxWidth:640 }}>

          {/* Progress */}
          <div style={{ marginBottom:28 }}>
            <div style={{
              display:'flex', justifyContent:'space-between', alignItems:'center',
              fontSize:'.82rem', fontWeight:600,
              color:'rgba(130,147,177,0.7)', marginBottom:10,
            }}>
              <span>שאלה {qIdx + 1} מתוך {total}</span>
              {qIdx > 0 && (
                <button onClick={goBack} disabled={chosenIdx !== null} style={{
                  background:'none', border:'none', cursor:'pointer',
                  color:'rgba(130,147,177,0.65)', fontSize:'.82rem', fontWeight:600,
                  fontFamily:"'Rubik', sans-serif",
                  display:'flex', alignItems:'center', gap:5,
                  padding:'4px 8px', borderRadius:8,
                  transition:'color .18s',
                  opacity: chosenIdx !== null ? 0.4 : 1,
                }}
                  onMouseEnter={e => e.currentTarget.style.color='rgba(130,147,177,1)'}
                  onMouseLeave={e => e.currentTarget.style.color='rgba(130,147,177,0.65)'}>
                  → חזרה
                </button>
              )}
            </div>
            <div style={{
              height:4, background:'rgba(255,255,255,0.07)',
              borderRadius:'99px', overflow:'hidden',
            }}>
              <div style={{
                width:`${pct}%`, height:'100%',
                background:'linear-gradient(90deg, #465975, #8293b1)',
                borderRadius:'99px',
                transition:'width 0.5s cubic-bezier(.4,0,.2,1)',
              }} />
            </div>
          </div>

          {/* Question card */}
          <div style={{
            background:'rgba(70,89,117,0.18)',
            border:'1.5px solid rgba(130,147,177,0.14)',
            borderRadius:22,
            padding:'36px 32px',
            backdropFilter:'blur(20px)',
            boxShadow:'0 20px 60px rgba(22,37,71,0.40)',
          }}>
            <p style={{
              fontSize:'1.22rem',
              fontWeight:700,
              lineHeight:1.65,
              color:'#e0e1dd',
              marginBottom:28,
              marginTop:0,
            }}>
              {QUESTIONS[qIdx].q}
            </p>
            <div style={{ display:'flex', flexDirection:'column', gap:11 }}>
              {QUESTIONS[qIdx].a.map((ans, i) => (
                <button key={`${qIdx}-${i}`}
                  disabled={chosenIdx !== null}
                  onClick={() => pick(ans.type, i)}
                  className={['ans-btn', chosenIdx===i?'chosen':'', chosenIdx!==null&&chosenIdx!==i?'dimmed':''].join(' ')}>
                  {ans.t}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function FormScreen({ profile, onSuccess }) {
      const [form,        setForm]        = useState({ email:'' });
      const [errors,      setErrors]      = useState({});
      const [touched,     setTouched]     = useState({});
      const [emailHint,   setEmailHint]   = useState('');
      const [emailValid,  setEmailValid]  = useState(false);
      const [loading,     setLoading]     = useState(false);
      const [serverErr,   setServerErr]   = useState('');
      const [consent,     setConsent]     = useState(false);
      const [consentErr,  setConsentErr]  = useState('');

      function validateEmailField(val) {
        if (!val.trim()) return 'שדה חובה';
        if (!isValidEmail(val)) return 'כתובת אימייל לא תקינה — בדקי שכתבת נכון';
        return '';
      }

      const set = k => e => {
        const val = e.target.value;
        setForm(p => ({ ...p, [k]: val }));
        if (touched[k] && k === 'email') {
          const err = validateEmailField(val);
          setErrors(p => ({ ...p, email: err }));
          setEmailValid(!err && !suggestEmail(val));
          setEmailHint(!err ? (suggestEmail(val) ? `האם התכוונת ל-${suggestEmail(val)}?` : '') : '');
        }
      };

      const handleEmailBlur = () => {
        setTouched(p => ({ ...p, email: true }));
        const err = validateEmailField(form.email);
        setErrors(p => ({ ...p, email: err }));
        const suggestion = suggestEmail(form.email);
        setEmailValid(!err && !suggestion);
        setEmailHint(!err && suggestion ? `האם התכוונת ל-${suggestion}?` : '');
      };

      const applyEmailSuggestion = () => {
        const suggestion = suggestEmail(form.email);
        if (!suggestion) return;
        setForm(p => ({ ...p, email: suggestion }));
        setEmailHint('');
        setEmailValid(true);
        setErrors(p => ({ ...p, email: '' }));
      };

      function validate() {
        const e = {};
        const emailErr = validateEmailField(form.email);
        if (emailErr) e.email = emailErr;
        else if (suggestEmail(form.email)) e.email = `נראה שיש שגיאת הקלדה, האם התכוונת ל-${suggestEmail(form.email)}?`;
        return e;
      }

      async function handleSubmit(ev) {
        ev.preventDefault();
        setServerErr('');
        setTouched({ email: true });
        const errs = validate();
        if (!consent) { setConsentErr('יש לאשר קבלת דיוורים להמשך'); errs._consent = true; }
        else { setConsentErr(''); }
        if (Object.keys(errs).length) { setErrors(errs); return; }
        setErrors({});
        setLoading(true);
        try {
          await Promise.allSettled([
            fetch(WEBHOOK, {
              method:'POST',
              headers:{ 'Content-Type':'application/json' },
              body: JSON.stringify({
                email:                 form.email.trim(),
                diagnosis_title:       profile.label,
                diagnosis_description: profile.desc,
              }),
            }),
            addToRavMesser(form.email.trim(), ''),
          ]);
          onSuccess(form.email.trim());
        } catch (err) {
          console.error(err);
          setServerErr('שגיאה בשליחה. אנא נסי שנית.');
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="animate-fade-up w-full" style={{ maxWidth:500 }}>
          <Logo />
          <div style={{
            background:'rgba(70,89,117,0.18)',
            border:'1.5px solid rgba(130,147,177,0.14)',
            borderRadius:24,
            padding:'44px 36px',
            backdropFilter:'blur(24px)',
            boxShadow:'0 24px 64px rgba(22,37,71,0.45)',
          }}>
            <div style={{ textAlign:'center', marginBottom:32 }}>
              <h2 style={{
                color:'#e0e1dd', fontSize:'1.55rem',
                fontWeight:800, margin:'0 0 10px',
                letterSpacing:'-0.01em',
              }}>
                כמעט סיימנו!
              </h2>
              <p style={{ color:'#8293b1', fontSize:'.97rem', lineHeight:1.7, margin:0, fontWeight:400 }}>
                לאיזה מייל לשלוח את התוצאה?
              </p>
            </div>

            <form onSubmit={handleSubmit} noValidate>
              <Field label="כתובת אימייל" id="email" type="email" placeholder="your@email.com"
                     value={form.email} onChange={set('email')} onBlur={handleEmailBlur}
                     error={errors.email} hint={emailHint} valid={emailValid} />
              {emailHint && !errors.email && (
                <div style={{ marginTop:-12, marginBottom:16 }}>
                  <button type="button" onClick={applyEmailSuggestion} style={{
                    background:'rgba(251,191,36,0.12)',
                    border:'1px solid rgba(251,191,36,0.35)',
                    borderRadius:8, padding:'7px 16px',
                    color:'rgba(251,191,36,0.95)', fontSize:'.80rem', fontWeight:700,
                    cursor:'pointer', fontFamily:"'Rubik', sans-serif",
                    transition:'all .18s',
                  }}
                  onMouseEnter={e => e.target.style.background='rgba(251,191,36,0.22)'}
                  onMouseLeave={e => e.target.style.background='rgba(251,191,36,0.12)'}>
                    כן, תקני אוטומטית ←
                  </button>
                </div>
              )}

              {serverErr && (
                <div style={{
                  marginBottom:16, padding:'12px 18px', borderRadius:12,
                  fontSize:'.88rem', fontWeight:600,
                  background:'rgba(248,113,113,0.12)',
                  border:'1px solid rgba(248,113,113,0.28)',
                  color:'rgba(248,113,113,0.9)',
                }}>
                  {serverErr}
                </div>
              )}

              {/* Consent checkbox */}
              <div style={{ marginBottom:18, marginTop:4 }}>
                <label style={{
                  display:'flex', alignItems:'flex-start', gap:12,
                  cursor:'pointer', userSelect:'none',
                }}>
                  <div style={{ position:'relative', flexShrink:0, marginTop:2 }}>
                    <input
                      type="checkbox"
                      checked={consent}
                      onChange={e => { setConsent(e.target.checked); if (e.target.checked) setConsentErr(''); }}
                      style={{ position:'absolute', opacity:0, width:0, height:0 }}
                    />
                    <div style={{
                      width:20, height:20, borderRadius:6,
                      border: consentErr
                        ? '2px solid rgba(248,113,113,0.7)'
                        : consent
                          ? '2px solid #8293b1'
                          : '2px solid rgba(130,147,177,0.40)',
                      background: consent ? 'rgba(130,147,177,0.25)' : 'rgba(70,89,117,0.20)',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      transition:'all .18s',
                    }}>
                      {consent && (
                        <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
                          <path d="M1 4L4 7.5L10 1" stroke="#8293b1" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                      )}
                    </div>
                  </div>
                  <span style={{
                    fontSize:'.80rem', color:'rgba(130,147,177,0.75)',
                    fontWeight:400, lineHeight:1.6,
                  }}>
                    אני מאשר/ת קבלת דברי פרסומת, עדכונים ותוכן שיווקי מאור קינדה, באמצעות דוא״ל, בהתאם ל־{' '}
                    <a href="#" style={{ color:'rgba(130,147,177,0.90)', textDecoration:'underline', textUnderlineOffset:2 }}>
                      מדיניות הפרטיות
                    </a>
                  </span>
                </label>
                {consentErr && (
                  <p style={{ margin:'6px 0 0 32px', color:'rgba(248,113,113,0.9)', fontSize:'.80rem', fontWeight:600 }}>
                    {consentErr}
                  </p>
                )}
              </div>

              <button type="submit" disabled={loading} style={{
                width:'100%', marginTop:4,
                padding:'17px 24px',
                borderRadius:'50px',
                fontWeight:800, fontSize:'1.05rem',
                color:'#e0e1dd', fontFamily:"'Rubik', sans-serif",
                background: loading ? 'rgba(70,89,117,0.35)' : 'linear-gradient(145deg, #465975, #2a4060)',
                border:'1.5px solid rgba(130,147,177,0.25)',
                cursor: loading ? 'not-allowed' : 'pointer',
                display:'flex', alignItems:'center', justifyContent:'center', gap:10,
                transition:'all .22s',
                boxShadow: loading ? 'none' : '0 6px 24px rgba(22,37,71,0.40)',
                opacity: loading ? 0.7 : 1,
              }}>
                {loading ? (
                  <>
                    <svg style={{ width:20, height:20, animation:'spinR 0.8s linear infinite' }}
                      viewBox="0 0 24 24" fill="none">
                      <circle style={{ opacity:.25 }} cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                      <path style={{ opacity:.8 }} fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                    שולח...
                  </>
                ) : 'הצגי לי את האבחון ←'}
              </button>

            </form>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       RESULT SCREEN
    ══════════════════════════════════════ */
    function CTABox() {
      return (
        <div className="cta-box">
          <div style={{ position:'relative', zIndex:1 }}>

            {/* Badge */}
            <div style={{
              display:'inline-flex', alignItems:'center', gap:8,
              background:'rgba(224,225,221,0.10)',
              border:'1px solid rgba(224,225,221,0.18)',
              color:'rgba(224,225,221,0.60)',
              fontSize:'.75rem', fontWeight:700, letterSpacing:'.08em',
              padding:'5px 16px', borderRadius:'99px', marginBottom:22,
            }}>
              <span style={{ width:6, height:6, borderRadius:'50%', background:'rgba(224,225,221,0.5)', display:'inline-block' }} />
              שיחת הפיצוח · 60 דקות · חינם
            </div>

            {/* Headline */}
            <h3 style={{
              color:'#e0e1dd', fontSize:'1.28rem', fontWeight:800,
              margin:'0 0 18px', lineHeight:1.45, letterSpacing:'-0.01em',
            }}>
              מרגישה שהאבחון פגע בנקודה?<br />
              זה הזמן להפסיק לנחש ולבנות תוכנית עבודה.
            </h3>

            {/* Body */}
            <p style={{
              color:'rgba(224,225,221,0.78)', fontSize:'.95rem',
              lineHeight:1.8, marginBottom:28, fontWeight:400,
            }}>
              כדי להפוך את האבחון הזה לתוצאות בשטח, אני מזמינה אותך לשיחת אסטרטגיה וייעוץ ממוקדת (60 דקות) ללא עלות. בשיחה ננתח יחד את המחסום האישי שלך ונבין איך לייצר שיווק שעובד עבורך.
            </p>

            {/* CTA */}
            <a href="#" className="cta-btn">
              אני רוצה שיחת פיצוח ←
            </a>

            {/* Trust */}
            <p style={{
              marginTop:16, fontSize:'.78rem',
              color:'rgba(224,225,221,0.38)', fontWeight:500,
            }}>
              ללא עלות · ללא התחייבות
            </p>

          </div>
        </div>
      );
    }

    function ScoreBars({ scores, winnerKey }) {
      return (
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          {TYPE_ORDER.map(k => {
            const pct      = Math.round((scores[k] / TOTAL_SCORED) * 100);
            const prof     = PROFILES[k];
            const isWinner = k === winnerKey;
            return (
              <div key={k}>
                <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:7 }}>
                  <span style={{
                    fontSize: isWinner ? '1rem' : '.88rem',
                    fontWeight: isWinner ? 800 : 500,
                    color: isWinner ? '#162547' : '#6b7280',
                    minWidth:148,
                  }}>
                    {prof.label} {isWinner && '⭐'}
                  </span>
                </div>
                <div className="score-bar-track">
                  <div className="score-bar-fill" style={{
                    '--bar-w': `${pct}%`,
                    width:`${pct}%`,
                    background: isWinner
                      ? 'linear-gradient(90deg, #465975, #162547)'
                      : '#c5cdd9',
                    opacity: isWinner ? 1 : 0.55,
                  }} />
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function ResultScreen({ profile, scores, userName }) {
      useEffect(() => {
        document.body.style.background = '#162547';
        window.scrollTo({ top:0, behavior:'instant' });
        return () => { document.body.style.background = ''; };
      }, []);

      const descParagraphs = profile.desc.split('\n\n');

      return (
        <div className="result-page animate-fade-in">

          {/* ── Hero ── */}
          <div className="result-hero">
            <Logo small />
            <div style={{ marginTop:22, position:'relative', zIndex:1 }}>
              <div className="hero-badge">תוצאת האבחון שלך</div>
              <h1 style={{
                color:'#e0e1dd',
                fontSize:'clamp(2rem,6vw,3rem)',
                fontWeight:800,
                margin:'0 0 16px',
                lineHeight:1.2,
                letterSpacing:'-0.02em',
              }}>
                {profile.label}
              </h1>
              <div style={{
                width:52, height:3,
                background:'linear-gradient(90deg, rgba(130,147,177,0.5), rgba(224,225,221,0.3))',
                borderRadius:'99px',
                margin:'0 auto 20px',
              }} />
              <p style={{
                color:'rgba(224,225,221,0.72)',
                fontSize:'1rem', lineHeight:1.75,
                maxWidth:520, margin:'0 auto',
                fontWeight:400,
              }}>
                הנה התוצאה של האבחון השיווקי שלך ודרכי פעולה לשפר את המצב
              </p>
            </div>
          </div>

          <div className="result-container">

            {/* Diagnosis */}
            <div className="result-card" style={{
              marginTop:'-32px',
              animation:'fadeUp 0.6s 0.1s cubic-bezier(.16,1,.3,1) both',
              background:'rgba(22,37,71,0.55)',
              border:'1.5px solid rgba(130,147,177,0.20)',
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:16 }}>
                <span style={{
                  fontSize:'1.6rem', lineHeight:1,
                }}>{profile.emoji}</span>
                <h2 style={{
                  fontSize:'1.25rem', fontWeight:800,
                  color:'#e0e1dd', margin:0,
                  letterSpacing:'-0.01em',
                }}>
                  {profile.label}
                </h2>
              </div>
              <div style={{
                width:'100%', height:'1.5px', marginBottom:20,
                background:'linear-gradient(90deg, rgba(224,225,221,0.25), rgba(130,147,177,0.15), transparent)',
                borderRadius:'99px',
              }} />
              {descParagraphs.map((p, i) => (
                <p key={i} style={{
                  color: i === 0 ? 'rgba(224,225,221,0.90)' : 'rgba(224,225,221,0.72)',
                  lineHeight:1.85,
                  marginBottom: i < descParagraphs.length - 1 ? 18 : 0,
                  fontSize: i === 0 ? '1rem' : '.95rem',
                  fontWeight: i === 0 ? 500 : 400,
                }}>
                  {p}
                </p>
              ))}
            </div>

            {/* Strengths & Challenges */}
            <div className="grid-2" style={{ animation:'fadeUp 0.6s 0.28s cubic-bezier(.16,1,.3,1) both' }}>
              <div className="result-card" style={{
                marginBottom:0,
                background:'rgba(70,89,117,0.22)',
                border:'1.5px solid rgba(130,147,177,0.16)',
              }}>
                <h3 style={{
                  fontSize:'1.12rem', fontWeight:800,
                  color:'#e0e1dd', margin:'0 0 16px', letterSpacing:'-0.01em',
                }}>
                  יתרונות
                </h3>
                <div>
                  {profile.strengths.map((s, i) => (
                    <div key={i} className="strength-item">
                      <span style={{ color:'rgba(130,200,160,0.85)', fontSize:'.85rem', flexShrink:0, marginTop:3, fontWeight:700 }}>✓</span>
                      <span style={{ fontSize:'.86rem' }}>{s}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div className="result-card" style={{
                marginBottom:0,
                background:'rgba(22,37,71,0.45)',
                border:'1.5px solid rgba(130,147,177,0.12)',
              }}>
                <h3 style={{
                  fontSize:'1.12rem', fontWeight:800,
                  color:'#e0e1dd', margin:'0 0 16px', letterSpacing:'-0.01em',
                }}>
                  חסרונות
                </h3>
                <div>
                  {profile.challenges.map((c, i) => (
                    <div key={i} className="challenge-item">
                      <span style={{ color:'rgba(200,140,130,0.80)', fontSize:'.85rem', flexShrink:0, marginTop:3 }}>✕</span>
                      <span style={{ fontSize:'.86rem' }}>{c}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* CTA */}
            <div style={{ marginTop:16, animation:'fadeUp 0.6s 0.45s cubic-bezier(.16,1,.3,1) both' }}>
              <CTABox />
            </div>

          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       TRANSITION SCREEN
    ══════════════════════════════════════ */
    function TransitionScreen() {
      return (
        <div className="animate-fade-in" style={{
          position:'fixed', inset:0, zIndex:100,
          background:'#162547',
          display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center', gap:32,
        }}>
          {/* Pulsing rings */}
          <div style={{ position:'relative', width:80, height:80 }}>
            {[0,1,2].map(i => (
              <div key={i} style={{
                position:'absolute', inset:0,
                borderRadius:'50%',
                border:'2px solid rgba(130,147,177,0.4)',
                animation:`pulseGlow 1.8s ease-in-out ${i*0.5}s infinite`,
                transform:`scale(${1 + i*0.35})`,
              }} />
            ))}
            <div style={{
              position:'absolute', inset:0,
              borderRadius:'50%',
              background:'linear-gradient(145deg, #465975, #2a4060)',
              display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow:'0 0 40px rgba(70,89,117,0.5)',
            }}>
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <path d="M9 12l2 2 4-4" stroke="#e0e1dd" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ animation:'fadeIn 0.6s 0.4s ease both', opacity:0 }}/>
                <circle cx="12" cy="12" r="10" stroke="rgba(224,225,221,0.3)" strokeWidth="1.5"/>
              </svg>
            </div>
          </div>

          <div style={{ textAlign:'center' }}>
            <p style={{
              color:'#e0e1dd', fontSize:'1.15rem', fontWeight:700,
              margin:'0 0 8px', letterSpacing:'-0.01em',
            }}>
              מנתחת את התשובות שלך...
            </p>
            <p style={{ color:'rgba(130,147,177,0.6)', fontSize:'.88rem', fontWeight:400, margin:0 }}>
              האבחון שלך מוכן תוך שניות
            </p>
          </div>

          {/* Progress dots */}
          <div style={{ display:'flex', gap:8 }}>
            {[0,1,2].map(i => (
              <div key={i} style={{
                width:6, height:6, borderRadius:'50%',
                background:'rgba(130,147,177,0.5)',
                animation:`pulseGlow 1.2s ease-in-out ${i*0.3}s infinite`,
              }} />
            ))}
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       COOKIE BANNER
    ══════════════════════════════════════ */
    function CookieBanner() {
      const [visible, setVisible] = useState(() => !localStorage.getItem('cookieConsent'));

      if (!visible) return null;

      const accept = () => { localStorage.setItem('cookieConsent', 'accepted'); setVisible(false); };
      const decline = () => { localStorage.setItem('cookieConsent', 'declined'); setVisible(false); };

      return (
        <div style={{
          position:'fixed', bottom:0, left:0, right:0, zIndex:9999,
          background:'rgba(22,37,71,0.97)',
          borderTop:'1px solid rgba(130,147,177,0.18)',
          backdropFilter:'blur(16px)',
          padding:'18px 24px',
          display:'flex', flexWrap:'wrap', alignItems:'center',
          gap:14, justifyContent:'space-between',
        }}>
          <p style={{
            color:'rgba(224,225,221,0.78)', fontSize:'.84rem',
            lineHeight:1.6, margin:0, fontWeight:400,
            flex:'1 1 260px', minWidth:0,
          }}>
            אנחנו משתמשים בעוגיות (Cookies) לשיפור חוויית השימוש ולניתוח תנועה באתר.
            {' '}<span style={{ color:'rgba(130,147,177,0.75)' }}>המשך גלישה מהווה הסכמה למדיניות הפרטיות.</span>
          </p>
          <div style={{ display:'flex', gap:10, flexShrink:0 }}>
            <button onClick={decline} style={{
              background:'transparent',
              border:'1px solid rgba(130,147,177,0.28)',
              color:'rgba(130,147,177,0.75)', borderRadius:50,
              padding:'9px 20px', fontSize:'.82rem', fontWeight:600,
              cursor:'pointer', fontFamily:"'Rubik', sans-serif",
              transition:'all .18s',
            }}
              onMouseEnter={e => e.currentTarget.style.borderColor='rgba(130,147,177,0.55)'}
              onMouseLeave={e => e.currentTarget.style.borderColor='rgba(130,147,177,0.28)'}>
              דחה
            </button>
            <button onClick={accept} style={{
              background:'linear-gradient(145deg, #465975, #2a4060)',
              border:'1px solid rgba(130,147,177,0.25)',
              color:'#e0e1dd', borderRadius:50,
              padding:'9px 22px', fontSize:'.82rem', fontWeight:700,
              cursor:'pointer', fontFamily:"'Rubik', sans-serif",
              transition:'all .18s',
            }}
              onMouseEnter={e => e.currentTarget.style.transform='translateY(-1px)'}
              onMouseLeave={e => e.currentTarget.style.transform=''}>
              אישור ✓
            </button>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       APP ROOT
    ══════════════════════════════════════ */
    function App() {
      const [step,     setStep]     = useState('intro');
      const [profile,  setProfile]  = useState(null);
      const [scores,   setScores]   = useState({ M:0, B:0, T:0, P:0 });
      const [userName, setUserName] = useState('');

      const handleQuizComplete = useCallback((finalScores) => {
        setScores(finalScores);
        setProfile(calcResult(finalScores));
        setStep('form');
        window.scrollTo({ top:0, behavior:'smooth' });
      }, []);

      const handleFormSuccess = useCallback((email) => {
        setUserName(email);
        setStep('transitioning');
        setTimeout(() => setStep('result'), 2000);
      }, []);

      if (step === 'transitioning') {
        return <TransitionScreen />;
      }

      if (step === 'result') {
        return (
          <>
            <ResultScreen profile={profile} scores={scores} userName={userName} />
            <CookieBanner />
          </>
        );
      }

      return (
        <div style={{
          position:'relative', minHeight:'100vh',
          display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center',
          padding:'64px 16px',
        }}>
          <Background />
          <div style={{ position:'relative', zIndex:10, width:'100%', display:'flex', flexDirection:'column', alignItems:'center' }}>
            {step === 'intro' && <IntroScreen onStart={() => setStep('quiz')} />}
            {step === 'quiz'  && <QuizScreen  onComplete={handleQuizComplete} />}
            {step === 'form'  && <FormScreen  profile={profile} onSuccess={handleFormSuccess} />}
          </div>
          <CookieBanner />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
